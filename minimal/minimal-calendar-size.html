<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>

<style>
body{
    font-family: monospace;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#f5f5f5;
}

#calendar{
    width:fit-content;
}

table{
    border-collapse: collapse;
    table-layout: fixed;
    background-color: #fff;
    border: 2px solid #000;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    border-radius: 6px;
}

.month{
    background-color:#000;
    color:#fff;
    font-size:1.5em;
}

.year{
    font-size:12px;
    display:block;
    color:#fff;
}

.day-header{
    background-color:#f3fff3;
}

td,th{
    text-align:center;
}

th{
    padding:10px;
}

td{
    border-bottom:1px solid rgba(0,0,0,0.05);
}

td>span{
    padding:12px;
    display:block;
}

td.avui>span{
    font-weight:bold;
    background-color:#000;
    color:#fff;
}

td.fora>span{
    opacity:0.2;
}

.boto-next,.boto-prev{
    background:#000;
    color:#fff;
    border:none;
    font-size:20px;
    font-weight:bold;
    padding:5px 10px;
    cursor:pointer;
}

.boto-prev{
    float:left;
}

.boto-next{
    float:right;
}
</style>
</head>

<body>

<div id="calendar"></div>

<script>

var months=[
'January','February','March','April','May','June',
'July','August','September','October','November','December'
];

var days_abr=['Su','Mo','Tu','We','Th','Fr','Sa'];

Number.prototype.pad=function(num){
var str='';
for(var i=0;i<(num-this.toString().length);i++)
str+='0';
return str+=this.toString();
}

function calendar(widget,data){

var original=widget.getElementsByClassName('actiu')[0];

if(typeof original==='undefined'){
original=document.createElement('table');
original.setAttribute('data-actual',
data.getFullYear()+'/'+
data.getMonth().pad(2)+'/'+
data.getDate().pad(2))
widget.appendChild(original);
}

var e=document.createElement('table');
widget.appendChild(e);

var fila=document.createElement('tr');
var titol=document.createElement('th');

titol.setAttribute('colspan',7);
titol.setAttribute('class','month');

var boto_prev=document.createElement('button');
boto_prev.className='boto-prev';
boto_prev.innerHTML='◀';

var boto_next=document.createElement('button');
boto_next.className='boto-next';
boto_next.innerHTML='▶';

titol.appendChild(boto_prev);

titol.appendChild(document.createElement('span')).innerHTML=
months[data.getMonth()]+'<span class="year">'+data.getFullYear()+'</span>';

titol.appendChild(boto_next);

boto_prev.onclick=function(){
data.setMonth(data.getMonth()-1);
calendar(widget,data);
}

boto_next.onclick=function(){
data.setMonth(data.getMonth()+1);
calendar(widget,data);
}

fila.appendChild(titol);
e.appendChild(fila);

fila=document.createElement('tr');

for(var i=0;i<7;i++){
fila.innerHTML+='<th class="day-header">'+days_abr[i]+'</th>';
}

e.appendChild(fila);

var inici_mes=
new Date(data.getFullYear(),data.getMonth(),-1).getDay();

var actual=new Date(
data.getFullYear(),
data.getMonth(),
-inici_mes
);

for(var s=0;s<6;s++){

var fila=document.createElement('tr');

for(var d=0;d<7;d++){

var cela=document.createElement('td');
var span=document.createElement('span');

cela.appendChild(span);
span.innerHTML=actual.getDate();

if(actual.getMonth()!==data.getMonth())
cela.className='fora';

if(data.getDate()==actual.getDate() &&
data.getMonth()==actual.getMonth())
cela.className='avui';

actual.setDate(actual.getDate()+1);
fila.appendChild(cela);

}

e.appendChild(fila);
}

widget.innerHTML='';
widget.appendChild(e);
}

calendar(document.getElementById('calendar'),new Date());

</script>

</body>
</html>
